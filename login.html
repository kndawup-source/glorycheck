<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glory Check 관리자 로그인</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left,rgba(37,99,235,.14),transparent 34%),
    linear-gradient(135deg,#f4f7fb,#eef2ff);
  color:#111827;
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
}
.shell{
  width:100%;
  max-width:960px;
  display:grid;
  grid-template-columns:1fr .92fr;
  gap:20px;
}
.hero{
  background:#0f172a;
  color:#fff;
  border-radius:32px;
  padding:34px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:500px;
  box-shadow:0 30px 90px rgba(15,23,42,.22);
}
.logo{
  font-size:21px;
  font-weight:1000;
  letter-spacing:.09em;
}
.logo-sub{
  margin-top:8px;
  color:#bfdbfe;
  font-size:13px;
}
.hero h1{
  margin:44px 0 12px;
  font-size:42px;
  line-height:1.08;
  letter-spacing:-.06em;
}
.hero p{
  margin:0;
  color:#dbeafe;
  line-height:1.7;
}
.points{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:30px;
}
.point{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:15px;
}
.point b{display:block;font-size:20px}
.point span{
  display:block;
  margin-top:4px;
  color:#cbd5e1;
  font-size:12px;
  line-height:1.45;
}
.card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:32px;
  padding:30px;
  box-shadow:0 30px 90px rgba(15,23,42,.12);
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.kicker{
  width:max-content;
  background:#e0ecff;
  color:#1d4ed8;
  border-radius:999px;
  padding:7px 11px;
  font-size:12px;
  font-weight:1000;
}
h2{
  margin:16px 0 8px;
  font-size:31px;
  letter-spacing:-.045em;
}
.card p{
  margin:0 0 18px;
  color:#64748b;
  line-height:1.6;
}
label{
  display:block;
  margin:13px 0 7px;
  color:#334155;
  font-size:13px;
  font-weight:900;
}
input{
  width:100%;
  border:1px solid #dbe3ef;
  border-radius:15px;
  padding:15px;
  outline:none;
  font:inherit;
}
input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,.08);
}
button{
  width:100%;
  margin-top:16px;
  border:0;
  border-radius:16px;
  padding:15px;
  background:#2563eb;
  color:#fff;
  font:inherit;
  font-weight:1000;
  cursor:pointer;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}
.error{
  display:none;
  margin-top:12px;
  background:#fef2f2;
  color:#991b1b;
  border:1px solid #fecaca;
  border-radius:14px;
  padding:12px;
  font-size:13px;
}
.notice{
  margin-top:16px;
  background:#f8fafc;
  border:1px dashed #cbd5e1;
  border-radius:16px;
  padding:13px;
  color:#64748b;
  font-size:13px;
  line-height:1.55;
}
.footer{
  margin-top:18px;
  text-align:center;
  color:#94a3b8;
  font-size:12px;
}
@media(max-width:820px){
  body{align-items:flex-start;padding:14px}
  .shell{grid-template-columns:1fr}
  .hero{min-height:auto;padding:24px;border-radius:26px}
  .hero h1{font-size:34px;margin:28px 0 10px}
  .points{grid-template-columns:1fr}
  .card{border-radius:26px;padding:24px}
}
</style>
</head>

<body>

<div class="shell">
  <section class="hero">
    <div>
      <div class="logo">GLORY CHECK</div>
      <div class="logo-sub">Church Attendance & Care System</div>

      <h1>교회 출석과<br>새가족 관리를 쉽게.</h1>

      <p>
        예배 QR, 교인 출석, 새가족 등록, 미출석 케어를 한 화면에서 관리합니다.
      </p>
    </div>

    <div class="points">
      <div class="point"><b>01</b><span>예배 QR 생성</span></div>
      <div class="point"><b>02</b><span>출석 자동 기록</span></div>
      <div class="point"><b>03</b><span>미출석 케어</span></div>
    </div>
  </section>

  <section class="card">
    <div class="kicker">CHURCH ADMIN</div>

    <h2>관리자 로그인</h2>

    <p>교회 관리자 계정으로 로그인해주세요.</p>

    <label for="email">이메일</label>
    <input id="email" type="email" placeholder="관리자 이메일">

    <label for="password">비밀번호</label>
    <input id="password" type="password" placeholder="비밀번호">

    <button id="loginBtn" onclick="login()">로그인</button>

    <div id="errorBox" class="error"></div>

    <div class="notice">
      교회별 관리자 계정은 Glory Check HQ에서 생성할 수 있습니다.
    </div>

    <div class="footer">
      Glory Check · Church Admin
    </div>
  </section>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const SUPABASE_URL =
  "https://bwbyfscpemocqudrfgcs.supabase.co";

const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3Ynlmc2NwZW1vY3F1ZHJmZ2NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTkyMzgsImV4cCI6MjA5Mzg5NTIzOH0.jACzv52gOByi1se-6zA7_NmENjF2HnKDjEwdAMURn8A";

const supabase =
  createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showError(message){
  const box = document.getElementById('errorBox');
  box.textContent = message;
  box.style.display = 'block';
}

function clearError(){
  const box = document.getElementById('errorBox');
  box.textContent = '';
  box.style.display = 'none';
}

window.login = async function(){
  clearError();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('loginBtn');

  if(!email || !password){
    showError('이메일과 비밀번호를 입력해주세요.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '로그인 중...';

  const { data, error } =
    await supabase.auth.signInWithPassword({
      email,
      password
    });

  if(error){
    showError('로그인 실패. 계정 정보를 확인해주세요.');
    btn.disabled = false;
    btn.textContent = '로그인';
    return;
  }

  localStorage.setItem(
    'church_access_token',
    data.session.access_token
  );

  location.href = '/admin.html';
}
</script>

</body>
</html>
