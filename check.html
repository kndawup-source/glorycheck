<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glory Check 출석체크</title>

<style>
*{box-sizing:border-box}

html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;
  background:
    radial-gradient(circle at top,rgba(37,99,235,.16),transparent 36%),
    linear-gradient(160deg,#eef2ff,#f8fafc);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  color:#111827;
}

.card{
  width:100%;
  max-width:430px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:30px;
  padding:28px;
  box-shadow:0 24px 70px rgba(15,23,42,.10);
}

.brand{
  font-weight:1000;
  color:#2563eb;
  margin-bottom:12px;
  letter-spacing:.09em;
  font-size:13px;
}

h1{
  font-size:30px;
  margin:0 0 8px;
  letter-spacing:-.05em;
}

p{
  color:#64748b;
  line-height:1.6;
}

input,button{
  width:100%;
  max-width:100%;
  font:inherit;
}

input{
  padding:16px;
  border:1px solid #dbe3ef;
  border-radius:16px;
  margin:8px 0;
  outline:none;
}

input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,.08);
}

button{
  padding:16px;
  border:0;
  border-radius:16px;
  background:#2563eb;
  color:#fff;
  font-weight:1000;
  margin-top:10px;
  cursor:pointer;
}

button.secondary{
  background:#eef2ff;
  color:#1d4ed8;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.notice{
  background:#f8fafc;
  border:1px dashed #cbd5e1;
  border-radius:16px;
  padding:13px;
  margin:14px 0;
  font-size:14px;
  color:#374151;
  line-height:1.55;
}

.location-box{
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1e3a8a;
  border-radius:16px;
  padding:13px;
  margin:14px 0;
  font-size:14px;
  line-height:1.55;
}

.success{
  text-align:center;
  display:none;
}

.success .icon{
  font-size:58px;
}

.error{
  display:none;
  background:#fef2f2;
  color:#991b1b;
  border:1px solid #fecaca;
  border-radius:14px;
  padding:12px;
  margin-top:12px;
  font-size:14px;
  line-height:1.5;
}

.footer{
  margin-top:16px;
  text-align:center;
  color:#9ca3af;
  font-size:12px;
}

.badge{
  display:inline-block;
  padding:7px 11px;
  border-radius:999px;
  background:#eef2ff;
  color:#1d4ed8;
  font-weight:900;
  font-size:12px;
  margin:8px 0 4px;
}
</style>
</head>

<body>

<div class="card">
  <div id="formBox">
    <div class="brand">GLORY CHECK</div>

    <h1>출석체크</h1>

    <p>
      이름과 휴대폰 번호 뒤 4자리를 입력해주세요.
      등록되지 않은 분은 새가족으로 자동 등록됩니다.
    </p>

    <div class="notice">
      출석체크는 교회 현장에서만 가능합니다.
      위치 권한을 허용해야 출석이 완료됩니다.
    </div>

    <div class="location-box" id="locationBox">
      위치 확인 전입니다. 출석 버튼을 누르면 현재 위치를 확인합니다.
    </div>

    <input id="name" placeholder="이름" autocomplete="name">

    <input
      id="phoneLast4"
      placeholder="휴대폰 뒤 4자리"
      inputmode="numeric"
      maxlength="4"
    >

    <input
      id="department"
      placeholder="부서 예: 청년부 / 장년부 / 새가족"
    >

    <button id="submitBtn" onclick="checkin()">
      위치 확인 후 출석하기
    </button>

    <div id="errorBox" class="error"></div>

    <div class="footer">
      Glory Check · Church Attendance & Care
    </div>
  </div>

  <div id="successBox" class="success">
    <div class="icon">🙏</div>

    <h1>출석 확인 완료</h1>

    <p id="successText">
      좋은 예배 되세요.
    </p>

    <div id="newBadge" class="badge" style="display:none;">
      새가족으로 등록되었습니다
    </div>

    <div id="distanceBadge" class="badge" style="display:none;"></div>

    <button class="secondary" onclick="goHome()">
      교회 홈으로 이동
    </button>

    <div class="footer">
      잠시 후 교회 홈으로 이동합니다.
    </div>
  </div>
</div>

<script>
const token =
  new URLSearchParams(location.search).get('token');

let homeUrl = '/home.html';

function showError(message){
  const box = document.getElementById('errorBox');
  box.textContent = message;
  box.style.display = 'block';
}

function clearError(){
  const box = document.getElementById('errorBox');
  box.textContent = '';
  box.style.display = 'none';
}

function setLocationText(message){
  document.getElementById('locationBox').textContent = message;
}

function goHome(){
  location.href = homeUrl;
}

function getCurrentPosition(){
  return new Promise((resolve, reject) => {
    if(!navigator.geolocation){
      reject(new Error('이 기기는 위치 확인을 지원하지 않습니다.'));
      return;
    }

    navigator.geolocation.getCurrentPosition(
      position => {
        resolve({
          latitude: position.coords.latitude,
          longitude: position.coords.longitude,
          accuracy: position.coords.accuracy
        });
      },
      error => {
        if(error.code === error.PERMISSION_DENIED){
          reject(new Error('위치 권한이 거부되었습니다. 브라우저 설정에서 위치 권한을 허용해주세요.'));
          return;
        }

        if(error.code === error.TIMEOUT){
          reject(new Error('위치 확인 시간이 초과되었습니다. 다시 시도해주세요.'));
          return;
        }

        reject(new Error('현재 위치를 확인하지 못했습니다. 잠시 후 다시 시도해주세요.'));
      },
      {
        enableHighAccuracy:true,
        timeout:10000,
        maximumAge:0
      }
    );
  });
}

async function checkin(){
  clearError();

  const name =
    document.getElementById('name').value.trim();

  const phone_last4 =
    document.getElementById('phoneLast4').value.trim();

  const department =
    document.getElementById('department').value.trim();

  const btn =
    document.getElementById('submitBtn');

  if(!token){
    showError('유효하지 않은 QR입니다. 출석 담당자에게 문의해주세요.');
    return;
  }

  if(!name){
    showError('이름을 입력해주세요.');
    return;
  }

  if(!/^\d{4}$/.test(phone_last4)){
    showError('휴대폰 번호 뒤 4자리를 입력해주세요.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '위치 확인 중...';

  let position;

  try{
    position = await getCurrentPosition();

    setLocationText(
      `위치 확인 완료 · 오차 범위 약 ${Math.round(position.accuracy)}m`
    );

  }catch(error){
    showError(error.message);
    setLocationText('위치 확인이 필요합니다. 위치 권한을 허용해주세요.');
    btn.disabled = false;
    btn.textContent = '위치 확인 후 출석하기';
    return;
  }

  btn.textContent = '출석 확인 중...';

  try{
    const res = await fetch('/api/checkin', {
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        token,
        name,
        phone_last4,
        department,
        latitude: position.latitude,
        longitude: position.longitude,
        accuracy: position.accuracy
      })
    });

    const data =
      await res.json().catch(() => ({}));

    if(!res.ok){
      showError(data.error || '출석체크에 실패했습니다.');
      btn.disabled = false;
      btn.textContent = '위치 확인 후 출석하기';
      return;
    }

    if(data.church?.slug){
      homeUrl =
        `/home.html?church=${encodeURIComponent(data.church.slug)}`;
    }

    document.getElementById('formBox').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';

    document.getElementById('successText').innerHTML =
      `${data.service.title}<br>${data.member.name}님, 좋은 예배 되세요.`;

    if(data.is_new_member){
      document.getElementById('newBadge').style.display = 'inline-block';
    }

    if(typeof data.distance_m === 'number'){
      const badge = document.getElementById('distanceBadge');
      badge.style.display = 'inline-block';
      badge.textContent = `현장 확인 완료 · 약 ${data.distance_m}m`;
    }

    setTimeout(() => {
      location.href = homeUrl;
    }, 2200);

  }catch(error){
    showError('네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    btn.disabled = false;
    btn.textContent = '위치 확인 후 출석하기';
  }
}
</script>

</body>
</html>
