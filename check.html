<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glory Check 출석체크</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;
  background:
    radial-gradient(circle at top,rgba(37,99,235,.16),transparent 36%),
    linear-gradient(160deg,#eef2ff,#f8fafc);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  color:#111827;
}
.card{
  width:100%;
  max-width:430px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:30px;
  padding:28px;
  box-shadow:0 24px 70px rgba(15,23,42,.10);
}
.brand{
  font-weight:1000;
  color:#2563eb;
  margin-bottom:12px;
  letter-spacing:.09em;
  font-size:13px;
}
h1{
  font-size:30px;
  margin:0 0 8px;
  letter-spacing:-.05em;
}
p{
  color:#64748b;
  line-height:1.6;
}
input,button{
  width:100%;
  font:inherit;
}
input{
  padding:16px;
  border:1px solid #dbe3ef;
  border-radius:16px;
  margin:8px 0;
  outline:none;
}
input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,.08);
}
button{
  padding:16px;
  border:0;
  border-radius:16px;
  background:#2563eb;
  color:#fff;
  font-weight:1000;
  margin-top:10px;
  cursor:pointer;
}
button.secondary{
  background:#eef2ff;
  color:#1d4ed8;
}
button:disabled{
  opacity:.6;
  cursor:not-allowed;
}
.notice{
  background:#f8fafc;
  border:1px dashed #cbd5e1;
  border-radius:16px;
  padding:13px;
  margin:14px 0;
  font-size:14px;
  color:#374151;
  line-height:1.55;
}
.success{
  text-align:center;
  display:none;
}
.success .icon{
  font-size:58px;
}
.error{
  display:none;
  background:#fef2f2;
  color:#991b1b;
  border:1px solid #fecaca;
  border-radius:14px;
  padding:12px;
  margin-top:12px;
  font-size:14px;
  line-height:1.5;
}
.footer{
  margin-top:16px;
  text-align:center;
  color:#9ca3af;
  font-size:12px;
}
.badge{
  display:inline-block;
  padding:7px 11px;
  border-radius:999px;
  background:#eef2ff;
  color:#1d4ed8;
  font-weight:900;
  font-size:12px;
  margin:8px 0 4px;
}
</style>
</head>

<body>

<div class="card">
  <div id="formBox">
    <div class="brand">GLORY CHECK</div>

    <h1>출석체크</h1>

    <p>
      이름과 휴대폰 번호 뒤 4자리를 입력해주세요.
      등록되지 않은 분은 새가족으로 자동 등록됩니다.
    </p>

    <div class="notice">
      입력한 정보는 출석 확인과 새가족 안내 목적으로만 사용됩니다.
    </div>

    <input id="name" placeholder="이름" autocomplete="name">

    <input
      id="phoneLast4"
      placeholder="휴대폰 뒤 4자리"
      inputmode="numeric"
      maxlength="4"
    >

    <input
      id="department"
      placeholder="부서 예: 청년부 / 장년부 / 새가족"
    >

    <button id="submitBtn" onclick="checkin()">
      출석 완료하기
    </button>

    <div id="errorBox" class="error"></div>

    <div class="footer">
      Glory Check · Church Attendance & Care
    </div>
  </div>

  <div id="successBox" class="success">
    <div class="icon">🙏</div>

    <h1>출석 확인 완료</h1>

    <p id="successText">
      좋은 예배 되세요.
    </p>

    <div id="newBadge" class="badge" style="display:none;">
      새가족으로 등록되었습니다
    </div>

    <button class="secondary" onclick="goHome()">
      교회 홈으로 이동
    </button>

    <div class="footer">
      잠시 후 교회 홈으로 이동합니다.
    </div>
  </div>
</div>

<script>
const token =
  new URLSearchParams(location.search).get('token');

let homeUrl = '/home.html';

function showError(message){
  const box = document.getElementById('errorBox');
  box.textContent = message;
  box.style.display = 'block';
}

function clearError(){
  const box = document.getElementById('errorBox');
  box.textContent = '';
  box.style.display = 'none';
}

function goHome(){
  location.href = homeUrl;
}

async function checkin(){
  clearError();

  const name =
    document.getElementById('name').value.trim();

  const phone_last4 =
    document.getElementById('phoneLast4').value.trim();

  const department =
    document.getElementById('department').value.trim();

  const btn =
    document.getElementById('submitBtn');

  if(!token){
    showError('유효하지 않은 QR입니다. 출석 담당자에게 문의해주세요.');
    return;
  }

  if(!name){
    showError('이름을 입력해주세요.');
    return;
  }

  if(!/^\d{4}$/.test(phone_last4)){
    showError('휴대폰 번호 뒤 4자리를 입력해주세요.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '출석 확인 중...';

  try{
    const res = await fetch('/api/checkin', {
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        token,
        name,
        phone_last4,
        department
      })
    });

    const data =
      await res.json().catch(() => ({}));

    if(!res.ok){
      showError(data.error || '출석체크에 실패했습니다.');
      btn.disabled = false;
      btn.textContent = '출석 완료하기';
      return;
    }

    if(data.church?.slug){
      homeUrl =
        `/home.html?church=${encodeURIComponent(data.church.slug)}`;
    }

    document.getElementById('formBox').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';

    document.getElementById('successText').innerHTML =
      `${data.service.title}<br>${data.member.name}님, 좋은 예배 되세요.`;

    if(data.is_new_member){
      document.getElementById('newBadge').style.display = 'inline-block';
    }

    setTimeout(() => {
      location.href = homeUrl;
    }, 1800);

  }catch(error){
    showError('네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
    btn.disabled = false;
    btn.textContent = '출석 완료하기';
  }
}
</script>

</body>
</html>
